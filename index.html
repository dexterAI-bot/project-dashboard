<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project HQ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Project HQ</h1>
      <p>Everything you run or plan, plus one tap to tell the bot what we’re working on next.</p>
    </header>
    <div id="filters"></div>
    <div style="padding: 0 1.5rem 0.5rem">
      <input id="search-input" placeholder="Search by name, summary, or tag" />
    </div>
    <main id="project-grid"></main>

    <div id="detail-panel" class="detail-panel">
      <div class="card">
        <button id="close-detail" class="close-btn" aria-label="Close detail">×</button>
        <div>
          <div class="status-pill status-running" id="detail-status">Running</div>
          <h2 id="detail-name">Project</h2>
        </div>
        <p id="detail-summary">Summary</p>
        <div class="detail-row">
          <div>
            <h3>Architecture</h3>
            <p id="detail-architecture"></p>
          </div>
          <div>
            <h3>Tech Stack</h3>
            <p id="detail-tech"></p>
          </div>
        </div>
        <div>
          <h3>Links</h3>
          <ul class="link-list" id="detail-links"></ul>
        </div>
        <div>
          <h3>External URLs</h3>
          <ul class="link-list" id="detail-external"></ul>
        </div>
        <div>
          <h3>Next steps</h3>
          <ul id="detail-next"></ul>
        </div>
        <div>
          <h3>Owners</h3>
          <div class="owners" id="detail-owners"></div>
        </div>
        <div>
          <h3>Tags</h3>
          <div class="owners" id="detail-tags"></div>
        </div>
        <a id="telegram-action" class="tele-button" target="_blank" rel="noreferrer">
          <span class="tele-dot"></span>
          <span class="tele-icon-wrap">
            <svg class="tele-icon" viewBox="0 0 24 24" role="img" aria-hidden="true">
              <path d="M22.5 3.364c-.34-.238-.85-.286-1.3-.1L2.87 9.496c-.577.24-.836.89-.675 1.48.17.635.783 1.01 1.42.88l3.584-.676 2.55 2.383-1.13 4.313c-.15.57.2 1.16.78 1.32.44.12.9-.05 1.18-.42l4.58-5.2 3.2 2.403c.4.3.95.2 1.17-.2.22-.4.09-.94-.3-1.22L8.93 9.4l12.58-6.258c.46-.23.74-.75.57-1.12-.07-.16-.17-.31-.29-.45z"/>
            </svg>
          </span>
          <span>Ping Telegram</span>
        </a>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
