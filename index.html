<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project HQ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Project HQ</h1>
      <p>Everything you run or plan, plus one tap to tell the bot what we’re working on next.</p>
    </header>
    <div id="filters"></div>
    <div style="padding: 0 1.5rem 0.5rem">
      <input id="search-input" placeholder="Search by name, summary, or tag" />
    </div>
    <main id="project-grid"></main>

    <div id="detail-panel" class="detail-panel">
      <div class="card">
        <button id="close-detail" class="close-btn" aria-label="Close detail">×</button>
        <div>
          <div class="status-pill status-running" id="detail-status">Running</div>
          <h2 id="detail-name">Project</h2>
        </div>
        <p id="detail-summary">Summary</p>
        <div class="detail-row">
          <div>
            <h3>Architecture</h3>
            <p id="detail-architecture"></p>
          </div>
          <div>
            <h3>Tech Stack</h3>
            <p id="detail-tech"></p>
          </div>
        </div>
        <div>
          <h3>Links</h3>
          <ul class="link-list" id="detail-links"></ul>
        </div>
        <div>
          <h3>External URLs</h3>
          <ul class="link-list" id="detail-external"></ul>
        </div>
        <div>
          <h3>Next steps</h3>
          <ul id="detail-next"></ul>
        </div>
        <div>
          <h3>Owners</h3>
          <div class="owners" id="detail-owners"></div>
        </div>
        <div>
          <h3>Tags</h3>
          <div class="owners" id="detail-tags"></div>
        </div>
        <a id="telegram-action" class="tele-button" target="_blank" rel="noreferrer">
          <span class="tele-dot"></span>
          <span class="tele-icon-wrap">
            <svg class="tele-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" role="img" aria-hidden="true">
              <path d="M16 8a8 8 0 1 1-16 0 8 8 0 0 1 16 0zm-7.713-2.094c-1.168.486-4.666 2.01-4.666 2.01-.567.225-.595.442-.604.518-.03.243.275.339.69.47l.175.055c.408.133.958.288 1.243.294.39.01.868-.32 3.374-2.23.05-.012.12-.026.166.016s.042.12.037.141c-.03.129-1.227 1.241-1.846 1.817-.193.18-.33.307-.358.336-.189.198-.664.663-.664.663l-.188.186c-.38.366-.664.64.015 1.088.327.216.589.393.85.571.284.194.568.387.936.629.14.092.27.187.33.22.331.236.63.448.997.414.214-.02.435-.22.547-.82.265-1.417.786-4.486.906-5.751a1.4 1.4 0 0 0-.013-.315.34.34 0 0 0-.114-.217.53.53 0 0 0-.31-.093c-.3.005-.763.166-2.984 1.09z"/>
            </svg>
          </span>
          <span>Ping Telegram</span>
        </a>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
